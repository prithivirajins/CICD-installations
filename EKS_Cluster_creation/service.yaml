apiVersion: v1
kind: Service
metadata:
  name: myapp
  namespace: default
  labels:
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080   # optional; let Kubernetes assign if you omit
    - name: agent
      port: 50000
      targetPort: 50000
      nodePort: 32000
